<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNU | Login Portal</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="font-['Outfit'] bg-cover bg-center h-screen w-screen flex flex-col justify-center items-center relative"
    style="background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm z-0"></div>

    <div
        class="z-10 w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl overflow-hidden relative group">
        <!-- Shine effect -->
        <div
            class="absolute top-0 -inset-full h-full w-1/2 z-5 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white opacity-20 group-hover:animate-shine">
        </div>

        <div class="text-center mb-8">
            <h1 class="text-white text-3xl font-bold mb-2">Kazi Nazrul University</h1>
            <p class="text-white/80 text-sm">Welcome back! Please login to your portal.</p>
        </div>

        <!-- Role Toggle -->
        <div class="flex justify-center mb-6 bg-white/20 rounded-lg p-1 backdrop-blur-sm">
            <button id="studentBtn"
                class="flex-1 py-2 rounded-md bg-blue-600 text-white font-medium transition-all shadow-lg text-sm">Student</button>
            <button id="adminBtn"
                class="flex-1 py-2 rounded-md text-white/80 hover:text-white font-medium transition-all text-sm">Admin</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <!-- ID Input -->
            <div>
                <label class="block text-white/90 text-sm font-medium mb-1" id="idLabel">Student ID</label>
                <div class="relative">
                    <i class="fas fa-id-badge absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="userId" placeholder="Enter your ID"
                        class="w-full bg-white/10 border border-white/20 text-white rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white/20 transition-all placeholder-white/50"
                        required>
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-white/90 text-sm font-medium mb-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" id="userPass" placeholder="Enter your password"
                        class="w-full bg-white/10 border border-white/20 text-white rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white/20 transition-all placeholder-white/50"
                        required>
                </div>
            </div>

            <!-- Options -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-white/80 cursor-pointer hover:text-white transition-colors">
                    <input type="checkbox" id="rememberMe"
                        class="mr-2 rounded border-white/30 bg-white/10 text-blue-500 focus:ring-blue-500"> Remember me
                </label>
                <a href="#" id="forgotPass" class="text-blue-300 hover:text-blue-200 transition-colors">Forgot
                    Password?</a>
            </div>

            <!-- Submit -->
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-blue-500/30 transition-all duration-300 relative overflow-hidden flex justify-center items-center gap-2">
                <span>Login Securely</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <button id="otpLoginBtn"
                class="text-white/80 text-sm hover:text-white transition-colors border-b border-white/30 pb-1">
                <i class="fas fa-mobile-alt mr-1"></i> Login with OTP
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="z-10 absolute bottom-6 text-center w-full">
        <p class="text-white/60 text-sm font-medium">Created by deep mahanta</p>
    </div>

    <script src="assets/js/login.js"></script>
</body>

</html>
